<div class="panel panel-default">
  <div class="panel-body">
    <form (submit)="onSubmit($event)" id="document-edit">
      <div class="row">
        <div class="col-sm-12 form-group">
          <label for="subject">Subject</label>
          <input
            type="text"
            id="subject"
            class="form-control"
            size="120"
            max="120"
            #subject
          />
        </div>
        <div class="col-sm-12 form-group">
          <label for="message">Message</label>
          <input
            type="text"
            id="message"
            class="form-control"
            max="255"
            size="120"
            #msgText
          />
        </div>
      </div>
      <div class="row">
        <div class="col-xs-12">
          <div class="default-flex gap-small">
            <button
              class="btn btn-success"
              type="submit"
              (click)="onSendMessage()"
            >
              Send
            </button>
            <button class="btn btn-danger" type="button" (click)="onClear()">
              Clear
            </button>
            <!-- <button class="btn btn-primary" type="button" (click)="onEdit()">
              Edit
            </button>
            <button class="btn btn-primary" type="button" (click)="onDelete()">
              Delete
            </button> -->
          </div>
        </div>
      </div>
    </form>
  </div>
</div>
