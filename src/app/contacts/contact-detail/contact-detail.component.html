<!-- using code from: 
    - https://www.w3schools.com/bootstrap/bootstrap_panels.asp 
    - Angular tutorial
-->
<div class="panel panel-default">
  <div class="panel-heading">
    <h3>{{ contact.name }}</h3>
    <div class="default-flex">
      <img
        style="max-height: 60px"
        src="{{ contact.imageUrl }}"
        alt="{{ contact.name }}"
      />
      <div class="margin-auto-left default-flex gap-small">
        <a
          [routerLink]="['/contacts', contact.id, 'edit']"
          class="btn btn-primary"
          >Edit</a
        >
        <a (click)="onDelete()" class="btn btn-danger">Delete</a>
      </div>
    </div>
  </div>
  <div class="panel-body">
    <p><strong>Email: </strong>{{ contact.email }}</p>
    <p><strong>Phone: </strong>{{ contact.phone }}</p>
    <cms-contact-item
      *ngFor="let contact of contact.group"
      [contact]="contact"
    ></cms-contact-item>
  </div>
</div>
